<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10305e"/>
      <stop offset="100%" stop-color="#061529"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="64" cy="102" rx="46" ry="5" fill="#000000" opacity="0.18"/>

  <!-- ambulance body -->
  <g>
    <!-- main box -->
    <rect x="18" y="58" width="66" height="30" rx="6" fill="#ffffff"/>
    <!-- cab -->
    <path d="M84 88 L84 64 Q84 58 90 58 L98 58 Q104 58 107 64 L112 78 Q113 82 109 82 L109 88 Z" fill="#ffffff"/>
    <!-- cab window -->
    <path d="M92 63 L98 63 Q101 63 103 67 L106 76 L92 76 Z" fill="#c7d5ec"/>
    <!-- roof light bar -->
    <rect x="30" y="52" width="34" height="6" rx="3" fill="#d99a2b"/>
    <rect x="34" y="49" width="10" height="4" rx="2" fill="#c0483a"/>
    <rect x="48" y="49" width="10" height="4" rx="2" fill="#173f79"/>
    <!-- red cross badge -->
    <g transform="translate(36,66)">
      <rect x="-11" y="-11" width="22" height="22" rx="5" fill="#c0483a"/>
      <rect x="-6.5" y="-2.5" width="13" height="5" fill="#ffffff"/>
      <rect x="-2.5" y="-6.5" width="5" height="13" fill="#ffffff"/>
    </g>
    <!-- side stripe -->
    <rect x="58" y="76" width="24" height="4" fill="#173f79" opacity="0.5"/>
    <!-- wheels -->
    <circle cx="36" cy="90" r="9" fill="#0a2e33"/>
    <circle cx="36" cy="90" r="3.4" fill="#c7d5ec"/>
    <circle cx="98" cy="90" r="9" fill="#0a2e33"/>
    <circle cx="98" cy="90" r="3.4" fill="#c7d5ec"/>
  </g>

  <!-- upward evolution curve -->
  <polyline points="12,46 34,50 50,32 68,38 84,18 108,10"
            fill="none" stroke="#d99a2b" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="46" r="4.2" fill="#f7e6c4"/>
  <circle cx="50" cy="32" r="4.2" fill="#f7e6c4"/>
  <circle cx="84" cy="18" r="4.2" fill="#f7e6c4"/>
  <circle cx="108" cy="10" r="5.2" fill="#ffffff" stroke="#d99a2b" stroke-width="2.5"/>
</svg>
